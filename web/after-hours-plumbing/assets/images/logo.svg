<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 72" fill="none">
  <!-- Icon: lightbulb + wrench fusion — "the light that's always on" -->
  <g transform="translate(4, 6)">
    <!-- Outer glow ring -->
    <circle cx="30" cy="30" r="28" stroke="#c8a96e" stroke-width="1.5" opacity="0.25"/>
    <!-- Lightbulb body -->
    <path d="M30 8C20.06 8 12 16.06 12 26c0 5.8 2.74 10.96 7 14.26V46a3 3 0 0 0 3 3h16a3 3 0 0 0 3-3v-5.74C45.26 36.96 48 31.8 48 26c0-9.94-8.06-18-18-18z" fill="#c8a96e" opacity="0.15"/>
    <path d="M30 8C20.06 8 12 16.06 12 26c0 5.8 2.74 10.96 7 14.26V46a3 3 0 0 0 3 3h16a3 3 0 0 0 3-3v-5.74C45.26 36.96 48 31.8 48 26c0-9.94-8.06-18-18-18z" stroke="#c8a96e" stroke-width="2" fill="none"/>
    <!-- Filament -->
    <path d="M25 30c0-3 2.5-5 5-5s5 2 5 5" stroke="#c8a96e" stroke-width="2" stroke-linecap="round" fill="none"/>
    <line x1="30" y1="25" x2="30" y2="19" stroke="#c8a96e" stroke-width="2" stroke-linecap="round"/>
    <!-- Bulb base lines -->
    <line x1="23" y1="52" x2="37" y2="52" stroke="#b87333" stroke-width="2" stroke-linecap="round"/>
    <line x1="24" y1="56" x2="36" y2="56" stroke="#b87333" stroke-width="2" stroke-linecap="round"/>
    <line x1="26" y1="60" x2="34" y2="60" stroke="#b87333" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Light rays -->
    <line x1="30" y1="0" x2="30" y2="4" stroke="#c8a96e" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="8" y1="10" x2="11" y2="13" stroke="#c8a96e" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="52" y1="10" x2="49" y2="13" stroke="#c8a96e" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="2" y1="26" x2="6" y2="26" stroke="#c8a96e" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="54" y1="26" x2="58" y2="26" stroke="#c8a96e" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- Text: AFTER HOURS -->
  <text x="76" y="32" font-family="'Syne', system-ui, sans-serif" font-weight="800" font-size="26" letter-spacing="-0.5">
    <tspan fill="#f5f0eb">AFTER </tspan><tspan fill="#c8a96e">HOURS</tspan>
  </text>

  <!-- Text: PLUMBING & ELECTRICAL -->
  <text x="76" y="52" font-family="'DM Sans', system-ui, sans-serif" font-weight="500" font-size="11.5" letter-spacing="3.5" fill="#b87333">
    PLUMBING &amp; ELECTRICAL
  </text>

  <!-- Decorative line -->
  <line x1="76" y1="58" x2="310" y2="58" stroke="#c8a96e" stroke-width="0.5" opacity="0.3"/>
</svg>
